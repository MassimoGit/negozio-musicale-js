<nav class="navbar navbar-expand-md navbar-dark mb-4">
  <div class="container">
    <span class="navbar-brand fw-bold fs-5">
      <i class="bi bi-music-note-beamed me-2"></i>Negozio Musicale
    </span>
    <div class="btn-group" role="group">
      <button class="btn btn-outline-light" [class.active]="view() === 'artists'" (click)="setView('artists')">
        <i class="bi bi-person-badge me-1"></i>Artisti
      </button>
      <button class="btn btn-outline-light" [class.active]="view() === 'albums'" (click)="setView('albums')">
        <i class="bi bi-vinyl me-1"></i>Album
      </button>
    </div>
  </div>
</nav>

<main class="container mb-5 flex-grow-1">
  @if (view() === 'artists') {
   <!-- <app-artist-form
      [initialArtist]="editingArtist()"
      (save)="onSaveArtist($event)"
      (cancel)="onCancelArtist()"
    /> -->
    <h2 class="mb-3">Artisti</h2>
    <app-artist-list
      [artists]="artists()"
      (edit)="onEditArtist($event)"
      (delete)="onDeleteArtist($event)"
    />
  }

  @if (view() === 'albums') {
    <app-album-form
      [artists]="artists()"
      [initialAlbum]="editingAlbum()"
      (save)="onSaveAlbum($event)"
      (cancel)="onCancelAlbum()"
    />
    <h2 class="mb-3">Album</h2>
    <app-album-list
      [albums]="albums()"
      (edit)="onEditAlbum($event)"
      (delete)="onDeleteAlbum($event)"
    />
  }
</main>

<footer class="py-3 mt-auto">
  <div class="container text-center">
    <span><i class="bi bi-music-note-beamed me-1"></i>Negozio Musicale &mdash; soluzione Angular</span>
  </div>
</footer>

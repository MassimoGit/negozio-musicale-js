<div class="card mb-4">
  <div class="card-header">
    <h5 class="mb-0">{{ initialAlbum ? 'Modifica album' : 'Nuovo album' }}</h5>
  </div>
  <div class="card-body">
    <form (ngSubmit)="onSubmit()" #f="ngForm">
      <div class="row g-3">
        <div class="col-md-5">
          <label class="form-label fw-bold">Titolo</label>
          <input
            class="form-control"
            type="text"
            name="title"
            [(ngModel)]="formData.title"
            [disabled]="isSubmitting"
          />
        </div>
        <div class="col-md-2">
          <label class="form-label fw-bold">Anno</label>
          <input
            class="form-control"
            type="number"
            name="year"
            min="1900"
            max="2099"
            [(ngModel)]="formData.year"
            [disabled]="isSubmitting"
          />
        </div>
        <div class="col-md-2">
          <label class="form-label fw-bold">Prezzo (€)</label>
          <input
            class="form-control"
            type="number"
            name="price"
            min="0"
            step="0.01"
            [(ngModel)]="formData.price"
            [disabled]="isSubmitting"
          />
        </div>
        <div class="col-md-3">
          <label class="form-label fw-bold">Artista</label>
          <select
            class="form-select"
            name="artist_id"
            [(ngModel)]="formData.artist_id"
            [disabled]="isSubmitting"
          >
            <option [ngValue]="null">Seleziona artista</option>
            @for (artist of artists; track artist.id) {
              <option [ngValue]="artist.id">{{ artist.name }}</option>
            }
          </select>
        </div>
      </div>
      <div class="d-flex gap-2 mt-3">
        <button
          type="submit"
          class="btn btn-primary"
          [disabled]="!isValid || isSubmitting"
        >
          {{ isSubmitting ? 'Salvataggio...' : initialAlbum ? 'Modifica' : 'Salva nuovo' }}
        </button>
        @if (initialAlbum) {
          <button type="button" class="btn btn-secondary" (click)="cancel.emit()">
            <i class="bi bi-backspace-fill me-2"></i> Torna alla creazione
          </button>
        }
      </div>
    </form>
  </div>
</div>
